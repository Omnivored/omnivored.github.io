---
layout: page
title: "FUN"
description: "Game Screenshot Gallery — 游戏截图展示与存档"
header-img: "img/tag-bg.jpg"
---

<style>
/* ===== 全局 ===== */
:root {
  --primary: #2c3e50;
  --accent: #e74c3c;
  --bg-card: #ffffff;
  --bg-light: #f8f9fa;
  --border: #e8e8e8;
  --text: #333;
  --text-light: #888;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 10px;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

/* ===== 游戏标签栏 ===== */
.game-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.game-tab {
  padding: 8px 22px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-light);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.25s;
  user-select: none;
}
.game-tab:hover { border-color: var(--primary); color: var(--primary); }
.game-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.game-tab.add-tab {
  border-style: dashed;
  color: var(--accent);
  border-color: var(--accent);
  background: #fff;
}
.game-tab.add-tab:hover { background: #fef2f2; }
.game-tab-input {
  padding: 6px 14px;
  border: 2px solid var(--accent);
  border-radius: 20px;
  font-size: 14px;
  outline: none;
  width: 140px;
}

/* ===== 第一部分：轮播 ===== */
.carousel-section {
  position: relative;
  width: 100%;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 40px;
  background: #1a1a2e;
  box-shadow: var(--shadow);
}
.carousel-track {
  position: relative;
  width: 100%;
  height: 420px;
  overflow: hidden;
}
.carousel-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.8s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a1a2e;
}
.carousel-slide.active {
  opacity: 1;
  z-index: 1;
}
.carousel-slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}
.carousel-slide .placeholder {
  color: #ccc;
  font-size: 16px;
  text-align: center;
  padding: 20px;
}
.carousel-slide .placeholder .filename {
  font-size: 13px;
  color: #888;
  margin-top: 8px;
}
.carousel-indicators {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 5;
  padding: 4px 12px;
  background: rgba(0,0,0,0.45);
  border-radius: 12px;
}
.carousel-indicators .dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.3s;
}
.carousel-indicators .dot.active { background: #fff; transform: scale(1.3); }
.carousel-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  opacity: 0.7;
}
.carousel-nav:hover { opacity: 1; background: rgba(0,0,0,0.75); }
.carousel-nav.prev { left: 14px; }
.carousel-nav.next { right: 14px; }
.carousel-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 260px;
  color: #aaa;
  font-size: 16px;
}

/* ===== 第二部分：图库与备注 ===== */
.gallery-section { margin-top: 10px; }

/* 搜索栏 */
.search-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.search-bar input {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--primary); }
.search-bar .stat-info {
  white-space: nowrap;
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: var(--text-light);
  font-size: 13px;
}

/* 图片网格 */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.gallery-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}
.gallery-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.gallery-card.hidden { display: none; }

.gallery-card .img-wrap {
  width: 100%;
  height: 200px;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.gallery-card .img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}
.gallery-card .img-wrap:hover img { transform: scale(1.05); }
.gallery-card .img-wrap .placeholder {
  color: #aaa;
  font-size: 13px;
  text-align: center;
  padding: 20px;
}

/* 备注区域 */
.notes-area {
  padding: 14px 16px 16px;
}
.notes-area .filename {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 10px;
  word-break: break-all;
}
.note-field {
  margin-bottom: 10px;
}
.note-field:last-child { margin-bottom: 0; }
.note-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-light);
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.note-field input,
.note-field textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
  background: var(--bg-light);
}
.note-field input:focus,
.note-field textarea:focus {
  border-color: var(--accent);
  background: #fff;
}
.note-field textarea {
  resize: vertical;
  min-height: 44px;
}
.note-field input::placeholder,
.note-field textarea::placeholder { color: #ccc; }

/* YAML 源提示 */
.yaml-source-hint {
  font-size: 11px;
  color: #aaa;
  text-align: right;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid #f0f0f0;
}
.yaml-source-hint a {
  color: #888;
  text-decoration: underline;
  text-decoration-style: dotted;
}
.yaml-source-hint a:hover { color: var(--accent); }

/* 模态框：大图预览 */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.modal-overlay.open { display: flex; }
.modal-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 6px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.modal-overlay .close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.modal-overlay .close-btn:hover { opacity: 1; }

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .carousel-track { height: 260px; }
  .carousel-nav { width: 32px; height: 32px; font-size: 16px; }
  .carousel-nav.prev { left: 8px; }
  .carousel-nav.next { right: 8px; }
  .gallery-grid { grid-template-columns: 1fr; }
  .game-tab { padding: 6px 16px; font-size: 13px; }
  .search-bar input { min-width: 140px; }
}
</style>

<!-- ============================================================ -->
<!-- 数据层：由 Liquid 在构建时渲染为 JavaScript                    -->
<!-- 图片来源：site.static_files 自动发现 img/games/ 目录下的图片   -->
<!-- 备注来源：_data/notes.yml                                    -->
<!-- ============================================================ -->
<script>
// ================================================================
// 第一部分：从 site.static_files 自动发现所有图片
// 图片放入 img/games/{游戏名}/ 目录即可自动出现
// ================================================================
var SCREENSHOT_DATA = {};
var NOTES_DATA = {};

{% for file in site.static_files %}
  {% assign ext = file.extname | downcase %}
  {% if ext == '.jpg' or ext == '.jpeg' or ext == '.png' or ext == '.gif' or ext == '.webp' %}
    {% if file.path contains 'img/games/' %}
      {% assign parts = file.path | split: '/' %}
      {% assign game_id = parts[parts.size | minus: 2] %}
      {% assign filename = file.name %}
      {% assign src = site.baseurl | append: '/' | append: file.path | replace: '//', '/' %}
      // {{ game_id }}/{{ filename }}
      SCREENSHOT_DATA['{{ game_id }}'] = SCREENSHOT_DATA['{{ game_id }}'] || [];
      SCREENSHOT_DATA['{{ game_id }}'].push({ "src": "{{ src }}", "filename": "{{ filename }}" });
    {% endif %}
  {% endif %}
{% endfor %}

// ================================================================
// 第二部分：从 _data/notes.yml 读取备注
// 编辑 _data/notes.yml 文件，上传后网站自动读取
// ================================================================
{% for game_entry in site.data.notes %}
  {% assign game_id = game_entry[0] %}
  {% assign notes_for_game = game_entry[1] %}
  NOTES_DATA['{{ game_id }}'] = {};

  {% for note_entry in notes_for_game %}
    {% assign filename = note_entry[0] %}
    {% assign note = note_entry[1] %}
    NOTES_DATA['{{ game_id }}']['{{ filename }}'] = {
      outfitCode: {{ note.outfitCode | default: null | jsonify }},
      cameraParams: {{ note.cameraParams | default: null | jsonify }},
      themeWords: {{ note.themeWords | default: null | jsonify }},
      customNotes: {{ note.customNotes | default: '' | jsonify }}
    };
  {% endfor %}
{% endfor %}

// ================================================================
// 游戏元信息 — 从自动发现的图片中提取游戏列表
// ================================================================
var GAME_META = {};
(function() {
  var gameIds = Object.keys(SCREENSHOT_DATA);
  gameIds.forEach(function(id) {
    GAME_META[id] = { name: id.charAt(0).toUpperCase() + id.slice(1) };
  });
  // 确保 Nikki 和 FF14 至少显示为标签
  if (!GAME_META.nikki) GAME_META.nikki = { name: "Nikki" };
  if (!GAME_META.ff14)  GAME_META.ff14  = { name: "FF14" };
  if (!SCREENSHOT_DATA.nikki) SCREENSHOT_DATA.nikki = [];
  if (!SCREENSHOT_DATA.ff14)  SCREENSHOT_DATA.ff14  = [];
})();
</script>

<!-- ============================================================ -->
<!-- HTML 结构                                                     -->
<!-- ============================================================ -->

<!-- 第一部分：轮播（所有游戏的所有图片） -->
<section class="carousel-section" id="carouselSection">
  <div class="carousel-track" id="carouselTrack"></div>
  <div class="carousel-indicators" id="carouselDots"></div>
  <button class="carousel-nav prev" id="carouselPrev">‹</button>
  <button class="carousel-nav next" id="carouselNext">›</button>
</section>

<!-- 第二部分：模式切换 + 图库 -->
<section class="gallery-section">
  <!-- 模式切换标签 -->
  <div class="game-tabs" id="modeTabs">
    <span class="game-tab active" data-mode="search">🔍 检索</span>
    <span class="game-tab" data-mode="recent">🕐 最近</span>
  </div>

  <!-- 检索模式 -->
  <div id="searchMode">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索备注内容（搭配码、镜头参数、主题词、自定义备注）…" />
      <span class="stat-info" id="statInfo">共 0 张</span>
    </div>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>
</section>

<!-- 大图预览模态框 -->
<div class="modal-overlay" id="imageModal">
  <span class="close-btn" id="modalClose">×</span>
  <img id="modalImg" src="" alt="preview" />
</div>

<!-- 备注悬浮窗 -->
<div class="modal-overlay" id="noteModal" style="cursor:default;">
  <span class="close-btn" id="noteModalClose">×</span>
  <div id="noteModalContent" style="background:#fff;border-radius:12px;padding:24px 28px;max-width:480px;width:90vw;cursor:auto;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3);"></div>
</div>

<!-- ============================================================ -->
<!-- JavaScript 主逻辑                                              -->
<!-- ============================================================ -->
<script>
(function() {
  'use strict';

  // ---- 配置 ----
  var CAROUSEL_INTERVAL = 1500; // 1.5 秒
  var RECENT_COUNT = 10;

  // ---- 状态 ----
  var carouselTimer = null;
  var currentSlide = 0;
  var currentMode = 'search'; // 'search' or 'recent'

  // ---- DOM 引用 ----
  var $track     = document.getElementById('carouselTrack');
  var $dots      = document.getElementById('carouselDots');
  var $prevBtn   = document.getElementById('carouselPrev');
  var $nextBtn   = document.getElementById('carouselNext');
  var $grid      = document.getElementById('galleryGrid');
  var $search    = document.getElementById('searchInput');
  var $statInfo  = document.getElementById('statInfo');
  var $imgModal  = document.getElementById('imageModal');
  var $imgModalImg = document.getElementById('modalImg');
  var $imgModalClose = document.getElementById('modalClose');
  var $noteModal = document.getElementById('noteModal');
  var $noteModalContent = document.getElementById('noteModalContent');
  var $noteModalClose = document.getElementById('noteModalClose');

  // ---- 获取所有图片（合并所有游戏） ----
  function getAllImages() {
    var all = [];
    var gameIds = Object.keys(SCREENSHOT_DATA);
    gameIds.forEach(function(id) {
      (SCREENSHOT_DATA[id] || []).forEach(function(img) {
        all.push({ gameId: id, src: img.src, filename: img.filename });
      });
    });
    return all;
  }

  // ---- 获取备注 ----
  function getNote(gameId, filename) {
    if (NOTES_DATA[gameId] && NOTES_DATA[gameId][filename]) {
      return NOTES_DATA[gameId][filename];
    }
    return { outfitCode: null, cameraParams: null, themeWords: null, customNotes: '' };
  }

  function hasNote(gameId, filename) {
    var note = getNote(gameId, filename);
    return note.outfitCode || note.cameraParams || note.themeWords || note.customNotes;
  }

  // ---- 渲染轮播（所有图片） ----
  function renderCarousel() {
    var images = getAllImages();
    $track.innerHTML = '';
    $dots.innerHTML = '';

    if (images.length === 0) {
      $track.innerHTML = '<div class="carousel-empty">暂无截图</div>';
      return;
    }

    images.forEach(function(img, idx) {
      var slide = document.createElement('div');
      slide.className = 'carousel-slide' + (idx === 0 ? ' active' : '');
      slide.innerHTML = '<img src="' + img.src + '" alt="' + img.filename + '" onerror="this.onerror=null;this.parentElement.innerHTML=\'<div class=placeholder>📷<br><span class=filename>\'+this.alt+\'</span></div>\'" />';
      $track.appendChild(slide);

      var dot = document.createElement('span');
      dot.className = 'dot' + (idx === 0 ? ' active' : '');
      dot.dataset.index = idx;
      dot.addEventListener('click', function() { goToSlide(parseInt(this.dataset.index)); });
      $dots.appendChild(dot);
    });

    currentSlide = 0;
    startCarousel();
  }

  function goToSlide(index) {
    var slides = $track.querySelectorAll('.carousel-slide');
    var dots  = $dots.querySelectorAll('.dot');
    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;
    slides.forEach(function(s, i) { s.classList.toggle('active', i === index); });
    dots.forEach(function(d, i) { d.classList.toggle('active', i === index); });
    currentSlide = index;
    resetCarouselTimer();
  }
  function nextSlide() { goToSlide(currentSlide + 1); }
  function prevSlide() { goToSlide(currentSlide - 1); }
  function startCarousel() {
    stopCarousel();
    var images = getAllImages();
    if (images.length < 2) return;
    carouselTimer = setInterval(nextSlide, CAROUSEL_INTERVAL);
  }
  function stopCarousel() {
    if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
  }
  function resetCarouselTimer() { stopCarousel(); startCarousel(); }

  // ---- 渲染图库 ----
  function renderGallery() {
    var allImages = getAllImages();
    var searchTerm = $search.value.trim().toLowerCase();

    // 根据模式筛选
    var filtered = [];
    allImages.forEach(function(img) {
      var note = getNote(img.gameId, img.filename);

      if (currentMode === 'search') {
        // 搜索模式：按备注关键词过滤
        if (searchTerm) {
          var searchable = [
            (note.outfitCode || ''),
            (note.cameraParams || ''),
            (note.themeWords || ''),
            (note.customNotes || '')
          ].join(' ').toLowerCase();
          if (searchable.indexOf(searchTerm) === -1) return;
        }
        filtered.push(img);
      } else {
        // 最近模式：按文件名排序取最新
        filtered.push(img);
      }
    });

    // 最近模式：按文件名排序（日期前缀），取前 RECENT_COUNT
    if (currentMode === 'recent') {
      filtered.sort(function(a, b) {
        return b.filename.localeCompare(a.filename);
      });
      filtered = filtered.slice(0, RECENT_COUNT);
    }

    // 渲染
    if (filtered.length === 0) {
      $grid.innerHTML = '<div style="text-align:center;padding:60px 0;color:#aaa;font-size:15px;">' +
        (currentMode === 'search' ? '未找到匹配的图片' : '暂无截图') + '</div>';
      $statInfo.textContent = '共 0 张';
      return;
    }

    var html = '';
    filtered.forEach(function(img) {
      var note = getNote(img.gameId, img.filename);
      var hasNotes = hasNote(img.gameId, img.filename);

      html += '<div class="gallery-card" data-game="' + img.gameId + '" data-filename="' + img.filename + '">';
      html += '  <div class="img-wrap" data-src="' + img.src + '">';
      html += '    <img src="' + img.src + '" alt="' + img.filename + '" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML=\'<div class=placeholder>📷 ' + img.filename + '</div>\'" />';
      html += '  </div>';
      html += '  <div class="notes-area">';
      html += '    <div class="filename">' + img.filename + '</div>';
      // 眼睛图标
      html += '    <div style="text-align:center;padding:6px 0;">';
      if (hasNotes) {
        html += '      <span class="eye-btn" style="cursor:pointer;font-size:22px;opacity:0.7;transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">👁️</span>';
      } else {
        html += '      <span style="font-size:12px;color:#ccc;">暂无备注</span>';
      }
      html += '    </div>';
      html += '  </div>';
      html += '</div>';
    });

    $grid.innerHTML = html;
    var totalInfo = '共 ' + allImages.length + ' 张';
    if (currentMode === 'search' && searchTerm) {
      totalInfo += '，匹配 ' + filtered.length + ' 张';
    } else if (currentMode === 'recent') {
      totalInfo += '，展示最近 ' + filtered.length + ' 张';
    }
    $statInfo.textContent = totalInfo;

    // 绑定大图预览
    $grid.querySelectorAll('.img-wrap').forEach(function(wrap) {
      wrap.addEventListener('click', function() {
        var src = this.getAttribute('data-src');
        if (src) {
          $imgModalImg.src = src;
          $imgModal.classList.add('open');
        }
      });
    });

    // 绑定眼睛按钮 -> 备注悬浮窗
    $grid.querySelectorAll('.eye-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var card = this.closest('.gallery-card');
        var gameId = card.getAttribute('data-game');
        var filename = card.getAttribute('data-filename');
        var note = getNote(gameId, filename);

        var html = '<div style="margin-bottom:14px;font-weight:600;font-size:15px;color:#333;word-break:break-all;">📄 ' + filename + '</div>';
        var fields = [
          { label: '🎀 搭配码', key: 'outfitCode', value: note.outfitCode },
          { label: '📷 镜头参数', key: 'cameraParams', value: note.cameraParams },
          { label: '🏷️ 主题词', key: 'themeWords', value: note.themeWords },
          { label: '📝 自定义备注', key: 'customNotes', value: note.customNotes }
        ];
        fields.forEach(function(f) {
          var val = f.value || '';
          html += '<div style="margin-bottom:12px;padding:10px 12px;background:#f8f9fa;border-radius:8px;border:1px solid #eee;">';
          html += '  <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px;">' + f.label + '</div>';
          html += '  <div style="font-size:14px;color:#333;word-break:break-all;min-height:20px;">' + (val || '<span style="color:#ccc">null</span>') + '</div>';
          html += '  <div style="text-align:right;margin-top:4px;">';
          html += '    <button class="copy-btn" data-text="' + escAttr(val) + '" style="padding:2px 10px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:12px;color:#888;transition:all 0.2s;" onmouseover="this.style.borderColor=\'#e74c3c\';this.style.color=\'#e74c3c\'" onmouseout="this.style.borderColor=\'#ddd\';this.style.color=\'#888\'">📋 复制</button>';
          html += '  </div>';
          html += '</div>';
        });

        $noteModalContent.innerHTML = html;

        // 绑定复制按钮
        $noteModalContent.querySelectorAll('.copy-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var text = this.getAttribute('data-text');
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(text).then(function() {
                var orig = this.textContent;
                this.textContent = '✅ 已复制';
                var self = this;
                setTimeout(function() { self.textContent = orig; }, 1500);
              }.bind(this)).catch(function() {});
            } else {
              // Fallback
              var ta = document.createElement('textarea');
              ta.value = text;
              document.body.appendChild(ta);
              ta.select();
              document.execCommand('copy');
              document.body.removeChild(ta);
              var orig = this.textContent;
              this.textContent = '✅ 已复制';
              var self = this;
              setTimeout(function() { self.textContent = orig; }, 1500);
            }
          });
        });

        $noteModal.classList.add('open');
      });
    });
  }

  // ---- 工具 ----
  function escAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // ---- 渲染全部 ----
  function renderAll() {
    renderCarousel();
    renderGallery();
  }

  // ---- 初始化 ----
  function init() {
    // 模式切换
    var modeTabs = document.getElementById('modeTabs');
    modeTabs.addEventListener('click', function(e) {
      var tab = e.target.closest('.game-tab');
      if (!tab) return;
      var mode = tab.getAttribute('data-mode');
      if (mode === currentMode) return;
      currentMode = mode;
      modeTabs.querySelectorAll('.game-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-mode') === mode);
      });
      // 搜索模式显示搜索框
      document.getElementById('searchMode').style.display = mode === 'search' ? 'block' : 'none';
      renderGallery();
    });

    // 导航按钮
    $prevBtn.addEventListener('click', function(e) { e.stopPropagation(); prevSlide(); });
    $nextBtn.addEventListener('click', function(e) { e.stopPropagation(); nextSlide(); });

    // 搜索防抖
    var searchTimer = null;
    $search.addEventListener('input', function() {
      if (currentMode !== 'search') { currentMode = 'search'; }
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(renderGallery, 200);
    });

    // 大图模态框关闭
    $imgModalClose.addEventListener('click', function() { $imgModal.classList.remove('open'); });
    $imgModal.addEventListener('click', function(e) {
      if (e.target === $imgModal) $imgModal.classList.remove('open');
    });

    // 备注悬浮窗关闭
    $noteModalClose.addEventListener('click', function() { $noteModal.classList.remove('open'); });
    $noteModal.addEventListener('click', function(e) {
      if (e.target === $noteModal) $noteModal.classList.remove('open');
    });

    // ESC 关闭所有模态框
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        $imgModal.classList.remove('open');
        $noteModal.classList.remove('open');
      }
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'ArrowRight') nextSlide();
    });

    // 鼠标悬停暂停轮播
    $track.addEventListener('mouseenter', stopCarousel);
    $track.addEventListener('mouseleave', startCarousel);

    renderAll();
  }

  init();
})();
</script>
