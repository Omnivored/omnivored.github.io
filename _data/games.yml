  guide: |
    新手进阶指南：

    1. 初期优先提升耐力，可以到达更多区域。

    2. 新手村出来后直奔「双子山」塔，解锁地图中部区域。

    3. 获得滑翔伞后优先去「海布拉山」获取防寒服。

    4. 四英杰任务的推荐顺序：风→水→火→雷。

    5. 呀哈哈种子的标记方法：发现但无法获取的用地图标记，后期再来。

    6. 大师剑获取需要13颗心，建议优先提升心心上限。
