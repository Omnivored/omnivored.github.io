    - src: "img/games/minione/race_start.jpg"
      tags: ["赛道", "竞速"]
      description: "开局弹射起步瞬间，速度达到最大"
    - src: "img/games/minione/drift_turn.jpg"
      tags: ["技巧", "漂移"]
      description: "完美漂移过弯，积攒加速能量"
    - src: "img/games/minione/shortcut.jpg"
      tags: ["探索", "捷径"]
