  guide: |
    全收集攻略要点：

    1. 每个关卡有3个隐藏瓦豆鲁迪，需要仔细探索每个角落。

    2. 第二世界有隐藏通道，需要利用卡比的变形能力通过。

    3. 最终BOSS二阶段需要完美闪避3次连击后才能有效输出。

    4. 收集全部设计图后可以解锁隐藏武器「星辰之剑」。
