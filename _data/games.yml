- name: "MiniOne Racing"
  tags: ["竞速", "漂移", "BOSS", "探索"]
  status: "Playing"
  progress: 92
  collectibles:
    - name: "赛车道具"
      found: 45
      total: 48
    - name: "隐藏皮肤"
      found: 6
      total: 10
    - name: "成就奖杯"
      found: 18
      total: 20
  guide: |
    游戏核心技巧：

    1. 开局加速：按油门键的同时按住方向键，可以触发弹射起步。

    2. 漂移过弯：入弯前松油门，按漂移键+方向，出弯时反打方向可以获得加速。

    3. 捷径路线：第3个赛道的右侧树林中有隐藏捷径，可节省约3秒。

    4. 道具使用：龟壳道具建议在直线赛道使用，香蕉皮放在弯道入口处效果最佳。

    5. BOSS战：最终BOSS弱点是正面撞击3次后它会眩晕，此时绕后攻击。
